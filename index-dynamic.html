<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663766268499/TPyApqDxGVMJbi7sx3RaSw/auramax-logo-7TWNPnyzD4VLLfwVuj8byF.webp" alt="Auramax Designs">

                <a href="#projects">Projects</a>

                <a href="admin/" class="admin-link">Admin</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-image">
            <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663766268499/TPyApqDxGVMJbi7sx3RaSw/hero-residential-space-8ozfucgqGhKJJYsQYHJTEE.webp" alt="Auramax Designs Hero">

        </div>

    <!-- Divider -->
    <div class="divider"></div>

    <section id="projects" class="projects">
        <div class="section-header">

        </div>

    <section id="awards" class="awards">
        <div class="section-header">
            <h2>Recognition</h2>
        </div>

        <div class="awards-grid" id="awards-grid">
            <!-- Awards loaded dynamically -->
        </div>

        <div class="publications">
            <h3>Publications</h3>
            <ul class="publications-list" id="publications-list">
                <!-- Publications loaded dynamically -->
            </ul>
        </div>
    </section>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Contact Section -->
    <footer id="contact" class="footer">
        <div class="footer-content" id="footer-content">
            <!-- Footer loaded dynamically -->
        </div>

        <div class="footer-bottom">
            <p id="copyright">&copy; 2024 Auramax Designs. All rights reserved.</p>
